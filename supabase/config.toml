# Supabase CLI configuration for the AOI Team Hub local stack.
# See https://supabase.com/docs/guides/local-development for the full reference.

project_id = "aoi-team-hub"

[api]
enabled = true
# Port the local PostgREST API is exposed on.
port = 54321
# Schemas exposed via the REST API.
schemas = ["public"]
# Extra schemas to inspect for relationships.
extra_search_path = ["public", "extensions"]
# Max rows returned in a single REST request.
max_rows = 1000

[db]
# Port the local Postgres database is exposed on.
port = 54322
# Port used by `supabase db diff` to spin up a shadow database.
shadow_port = 54320
# Major version of Postgres to use (Supabase ships 15+).
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
# Port Supabase Studio is exposed on.
port = 54323
api_url = "http://127.0.0.1:54321"

[inbucket]
# Local email testing UI (for confirmation/recovery emails).
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# Base URL of the site, used for redirects and email links.
site_url = "http://localhost:3000"
# Additional redirect URLs allowed after authentication.
additional_redirect_urls = ["http://localhost:3000", "https://localhost:3000"]
# JWT expiry in seconds (1 hour).
jwt_expiry = 3600
# Allow new users to sign up.
enable_signup = true
# Allow generating refresh tokens.
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[realtime]
enabled = true
