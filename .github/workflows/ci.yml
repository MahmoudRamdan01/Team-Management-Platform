name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # The build needs no real secrets — Supabase clients are constructed
          # lazily at request time. Placeholders keep next/build happy.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
